<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | ACK St. Paul's Parish Mafisini</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#0d47a1,#1976d2);

}

.container{

width:1000px;
max-width:95%;
display:grid;
grid-template-columns:1fr 1fr;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.2);

}

/* Left Panel */

.left{

background:linear-gradient(rgba(13,71,161,.9),rgba(25,118,210,.9)),
url("https://picsum.photos/700/900");
background-size:cover;
background-position:center;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:50px;
text-align:center;

}

.left img{

width:120px;
height:120px;
border-radius:50%;
background:white;
padding:10px;
margin-bottom:25px;

}

.left h1{

font-size:38px;
margin-bottom:15px;

}

.left p{

line-height:1.8;
font-size:17px;

}

/* Right Panel */

.right{

padding:50px;

}

.right h2{

color:#0d47a1;
margin-bottom:10px;

}

.right p{

color:#666;
margin-bottom:30px;

}

.form-group{

margin-bottom:22px;

}

label{

display:block;
margin-bottom:8px;
font-weight:600;

}

.input-box{

position:relative;

}

input{

width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;

}

input:focus{

border-color:#1976d2;

}

.toggle{

position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#1976d2;
font-weight:600;

}

.options{

display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
font-size:14px;

}

.options a{

text-decoration:none;
color:#1976d2;
font-weight:600;

}

button{

width:100%;
padding:15px;
margin-top:25px;
background:#1976d2;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#0d47a1;

}

.notice{

margin-top:25px;
background:#f4f7fb;
padding:18px;
border-left:5px solid #1976d2;
border-radius:8px;
font-size:14px;
line-height:1.7;

}

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

.left{

display:none;

}

.right{

padding:35px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<img src="https://picsum.photos/200" alt="Church Logo">

<h1>ACK St. Paul's Parish</h1>

<p>

Welcome to the Church Administration Portal.

Authorized administrators can securely manage members,
ministries, events, prayer requests, gallery,
reports and website settings.

</p>

</div>

<div class="right">

<h2>Administrator Login</h2>

<p>

Please sign in using your administrator credentials.

</p>

<form method="POST" action="{{ url_for('admin_login') }}">

<div class="form-group">

<label>Email Address</label>

<input
type="email"
name="email"
placeholder="Enter admin email"
required>

</div>


<div class="form-group">

<label>Password</label>

<div class="input-box">

<input
type="password"
name="password"
id="password"
placeholder="Enter password"
required>

<span
class="toggle"
onclick="togglePassword()">

Show

</span>

</div>

</div>


<div class="options">

<label style="display:flex;align-items:center;gap:8px;">

<input type="checkbox" style="width:18px;height:18px;">

Remember Me

</label>


<a href="#">
Forgot Password?
</a>


</div>


<button type="submit">

🔐 Login to Dashboard

</button>


</form>

<div style="margin-top:30px;text-align:center;">

<p style="color:#777;">


</div>

</div>

</div>

<script>

function togglePassword(){

const password=document.getElementById("password");

const toggle=document.querySelector(".toggle");

if(password.type==="password"){

password.type="text";

toggle.innerHTML="Hide";

}else{

password.type="password";

toggle.innerHTML="Show";

}

}

</script>

</body>

</html>
