<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | ACK St. Paul's Parish Mafisini</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}


body{

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
    url('https://images.unsplash.com/photo-1519491050282-cf00c82424b3?auto=format&fit=crop&w=1600&q=80');

    background-size:cover;
    background-position:center;

}



.container{

    width:400px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    padding:35px;

    border-radius:20px;

    color:white;

    border:1px solid rgba(255,255,255,.2);

    box-shadow:0 15px 40px rgba(0,0,0,.4);

}



.container h2{

    text-align:center;

    color:#FFD700;

    margin-bottom:8px;

}



.container p{

    text-align:center;

    margin-bottom:25px;

}



.alert{

    background:#ffdede;

    color:#900;

    padding:12px;

    border-radius:8px;

    margin-bottom:20px;

    text-align:center;

}



.input-group{

    margin-bottom:20px;

}



label{

    display:block;

    margin-bottom:6px;

}



input{

    width:100%;

    padding:13px;

    border:none;

    border-radius:8px;

    outline:none;

    font-size:15px;

}



.options{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;

    font-size:14px;

}



.options input{

    width:auto;

}



.options a{

    color:#FFD700;

    text-decoration:none;

}



button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:8px;

    background:#FFD700;

    color:#222;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}



button:hover{

    background:white;

}



.link{

    text-align:center;

    margin-top:20px;

}



.link a{

    color:#FFD700;

    text-decoration:none;

    font-weight:600;

}


</style>


</head>


<body>



<div class="container">


<h2>Member Login</h2>


<p>
ACK St. Paul's Parish Mafisini
</p>



{% with messages = get_flashed_messages(with_categories=true) %}

{% if messages %}

{% for category,message in messages %}

<div class="alert">

{{ message }}

</div>

{% endfor %}

{% endif %}

{% endwith %}





<form method="POST" action="{{ url_for('login') }}">



<div class="input-group">

<label>Email Address</label>

<input 
type="email"
name="email"
placeholder="Enter Email Address"
required>

</div>




<div class="input-group">

<label>Password</label>

<input 
type="password"
name="password"
placeholder="Enter Password"
required>

</div>




<div class="options">


<label>

<input type="checkbox">

Remember Me

</label>



<a href="#">

Forgot Password?

</a>


</div>




<button type="submit">

Login

</button>




<div class="link">


Don't have an account?

<a href="{{ url_for('register') }}">

Register Here

</a>


</div>



</form>


</div>



</body>

</html>
